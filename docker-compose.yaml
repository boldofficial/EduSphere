
services:
  db:
    image: 'postgres:15-alpine'
    container_name: registra_db
    ports:
      - '5432:5432'
    volumes:
      - 'postgres_data:/var/lib/postgresql/data'
    env_file:
      - .env
    command: postgres -c wal_level=replica -c max_wal_senders=10 -c max_replication_slots=10 -c hot_standby=on
    restart: always

    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  db_replica:
    image: 'postgres:15-alpine'
    container_name: registra_db_replica
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    command: |
      sh -c "until pg_basebackup -h db -D /var/lib/postgresql/data/pgdata -U ${POSTGRES_USER} -vP -W; do echo 'Waiting for primary...'; sleep 1; done && postgres"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - coolify
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'


  redis:
    image: 'redis:7-alpine'
    container_name: registra_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - '6379:6379'
    restart: always
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  pgbouncer:
    image: edoburu/pgbouncer
    container_name: registra_pgbouncer
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - MAX_CLIENT_CONN=500
      - DEFAULT_POOL_SIZE=50
      - MIN_POOL_SIZE=5
      - POOL_MODE=transaction
      - AUTH_TYPE=scram-sha-256
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '6432:6432'

    networks:
      - coolify
    restart: always
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: registra_backend
    volumes:
      - 'static_volume:/app/staticfiles'
      - 'media_volume:/app/media'
    networks:
      - coolify
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}
      - REPLICA_DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db_replica:5432/${POSTGRES_DB}

    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/core/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.5'
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.priority=1000
      # NOTE: /media intentionally excluded — files served directly from Cloudflare R2
      - 'traefik.http.routers.backend.rule=(Host(`myregistra.net`) || Host(`www.myregistra.net`) || HostRegexp(`^.+\.myregistra\.net$`)) && (PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/django-static`))'
      - traefik.http.routers.backend.entrypoints=https
      - traefik.http.routers.backend.tls=true
      - traefik.http.routers.backend.tls.certresolver=letsencrypt
      - traefik.http.services.backend.loadbalancer.server.port=8000
      - traefik.docker.network=coolify

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: registra_frontend
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - coolify
    environment:
      - 'DJANGO_API_URL=http://backend:8000'
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend-auth.priority=2000
      - 'traefik.http.routers.frontend-auth.rule=(Host(`myregistra.net`) || Host(`www.myregistra.net`) || HostRegexp(`^.+\.myregistra\.net$`)) && (PathPrefix(`/api/auth`) || PathPrefix(`/api/proxy`) || PathPrefix(`/api/aloc`))'
      - traefik.http.routers.frontend-auth.entrypoints=https
      - traefik.http.routers.frontend-auth.tls=true
      - traefik.http.routers.frontend-auth.tls.certresolver=letsencrypt
      - traefik.http.routers.frontend.priority=100
      - 'traefik.http.routers.frontend.rule=Host(`myregistra.net`) || Host(`www.myregistra.net`) || HostRegexp(`^.+\.myregistra\.net$`)'
      - traefik.http.routers.frontend.entrypoints=https
      - traefik.http.routers.frontend.tls=true
      - traefik.http.routers.frontend.tls.certresolver=letsencrypt
      - traefik.http.services.frontend.loadbalancer.server.port=3000
      - traefik.docker.network=coolify

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: registra_worker
    command: 'celery -A config worker -l info --concurrency=4 --max-tasks-per-child=100'
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}
      - REPLICA_DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db_replica:5432/${POSTGRES_DB}

    # on-failure prevents crash loops from consuming resources (unlike 'always')
    restart: on-failure
    networks:
      - coolify
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: registra_beat
    command: 'celery -A config beat -l info'
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}
      - REPLICA_DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db_replica:5432/${POSTGRES_DB}

    # on-failure prevents crash loops from consuming resources (unlike 'always')
    restart: on-failure
    networks:
      - coolify
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

volumes:
  postgres_data:
  static_volume:
  media_volume:
  certbot_etc:
  certbot_var:

networks:
  coolify:
    external: true
